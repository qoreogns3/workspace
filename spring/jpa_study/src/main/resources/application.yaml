spring:
  application:
    name: jpa_study

  datasource:
    url: jdbc:mariadb://localhost:3306/study_db
    username: study_user
    password: mariadb
    driver-class-name: org.mariadb.jdbc.Driver

#ddl-auto :
# 1)none : 아무 동작도 안함
# 2)create : 프로젝트 시작 시 테이블 삭제 후 재생성
# 3)create-drop : 프로젝트 시작 시 테이블 생성, 종료 시 삭제
# 그 외에 update, validate가 있음...
  jpa:
    hibernate:
      ddl-auto: none           # 우리는 직접 테이블을 만들 거라서 none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true       # SQL 보기 좋게 출력
        show_sql: true         # SQL 콘솔 출력
        use_sql_comments: true # 어떤 동작인지 주석으로

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace    # 파라미터 값까지 출력